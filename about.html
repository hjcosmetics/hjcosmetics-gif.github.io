<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - HJ COSMETICS | The Heritage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --off-white: #fdfaf5;
            --font-th: 'Prompt', sans-serif;
            --font-en: 'Inter', sans-serif;
            --font-head: 'Cinzel', serif;
            --font-kr: 'Nanum Myeongjo', serif;
        }

        /* --- Global Setup --- */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; -webkit-user-select: none; user-select: none; }
        
        body { 
            margin: 0; padding: 0; 
            background-color: var(--off-white); 
            color: #2d3436; 
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* --- 🎞️ Video Background --- */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.5; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(253,250,245,0.1) 0%, rgba(253,250,245,0.6) 100%); z-index: -1; }

        /* --- 🎖️ Navigation --- */
        nav { 
            background: rgba(255, 255, 255, 0.8); height: 80px; padding: 0 8%;
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .logo-nav img { height: 45px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--p-green); font-family: var(--font-en); font-weight: 600; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a.active { color: var(--gold); }
        .lang-btn { background: var(--p-green); color: white; border: none; padding: 8px 15px; cursor: pointer; font-family: var(--font-en); font-weight: 700; font-size: 0.7rem; border-radius: 2px; }

        /* --- ✨ Hero Section --- */
        .hero-header { text-align: center; padding: 60px 5% 30px; }
        .hero-header h1 { 
            font-size: clamp(2.2rem, 5vw, 3.8rem); 
            color: var(--p-green); 
            letter-spacing: 6px; 
            margin: 0; 
            font-weight: 600;
        }

        .main-container { max-width: 1300px; margin: 0 auto; padding: 0 5% 40px; }

        /* --- 🏛️ Story Section --- */
        .origin-section { 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 80px; border-radius: 30px; margin-bottom: 80px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }
        .story-flex { display: flex; align-items: center; gap: 60px; }
        .story-img { flex: 0.8; text-align: center; }
        .story-img img { width: 100%; max-width: 350px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1)); animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .story-text { flex: 1.2; }
        .story-text h2 { font-size: 2.8rem; color: var(--p-green); margin-bottom: 25px; font-weight: 600; }
        .story-text p { font-size: 1.05rem; line-height: 2; color: #333; margin-bottom: 40px; }

        /* --- 📊 Milestones --- */
        .milestone-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .milestone-item { padding: 20px 10px; background: rgba(255,255,255,0.4); border-bottom: 4px solid var(--gold); text-align: center; border-radius: 12px; }
        .milestone-year { color: var(--p-green); font-family: var(--font-en); font-size: 1.8rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .milestone-text { font-size: 0.65rem; color: #1b4332; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* --- 🏷️ Brand Cards --- */
        .brand-grid { 
            display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 40px; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
        }
        .brand-image { height: 450px; overflow: hidden; }
        .brand-image img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s ease; filter: brightness(0.95); }
        .brand-grid:hover .brand-image img { transform: scale(1.08); filter: brightness(1); }
        
        .brand-content { padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .brand-content span { color: var(--gold); letter-spacing: 3px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .brand-content h3 { font-size: 2.5rem; margin: 0 0 20px; color: var(--p-green); font-weight: 600; }
        .brand-content p { line-height: 1.8; color: #444; font-size: 1rem; margin-bottom: 30px; }
        
        .btn-visit { 
            align-self: flex-start; text-decoration: none; color: white; background: var(--p-green); 
            padding: 15px 30px; font-size: 0.75rem; letter-spacing: 2px; font-weight: 700; 
            transition: 0.3s; border-radius: 6px;
        }
        .btn-visit:hover { background: #143326; transform: translateY(-3px); }

        /* --- 🏛️ Footer --- */
        footer { padding: 40px 0; text-align: center; background: transparent; }
        .copy { font-size: 0.75rem; letter-spacing: 2px; color: #7f8c8d; font-family: var(--font-en); }

        /* --- 📱 RESPONSIVE FIX (ฟิกขนาด) --- */
        @media (max-width: 1024px) {
            .origin-section { padding: 50px 30px; }
            .story-flex { gap: 30px; }
            .brand-content { padding: 40px; }
        }

        @media (max-width: 768px) {
            nav { padding: 0 3%; height: auto; padding-top: 15px; padding-bottom: 15px; flex-direction: column; gap: 15px; }
            .nav-links { display: flex; gap: 15px; order: 2; }
            .nav-links a { font-size: 0.6rem; letter-spacing: 1px; }
            .logo-nav { order: 1; }
            .lang-btn { order: 3; padding: 5px 10px; }

            .hero-header { padding: 40px 5% 20px; }
            
            .origin-section { padding: 40px 20px; border-radius: 20px; }
            .story-flex { flex-direction: column; text-align: center; }
            .story-img img { max-width: 250px; }
            .story-text h2 { font-size: 2rem; }
            .milestone-container { grid-template-columns: 1fr; gap: 10px; }
            
            .brand-grid { grid-template-columns: 1fr; border-radius: 20px; }
            .brand-image { height: 300px; }
            .brand-grid[style*="rtl"] { direction: ltr !important; } /* ยกเลิกสลับซ้ายขวาในมือถือ */
            .brand-content { padding: 30px 20px; text-align: center; }
            .btn-visit { align-self: center; width: 100%; text-align: center; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<video autoplay muted loop playsinline id="bg-video"><source src="วิดีโอทำเว็บไซต์.mp4" type="video/mp4"></video>
<div class="bg-overlay"></div>

<nav>
    <div class="logo-nav"><a href="index.html"><img src="HJ (5).png" alt="HJ LOGO"></a></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="contact.html">Contact</a>
    </div>
    <button onclick="rotateLanguage()" id="langBtn" class="lang-btn">TH</button>
</nav>

<header class="hero-header">
    <h1 id="hero-title">Our Heritage</h1>
</header>

<div class="main-container">
    <section class="origin-section">
        <div class="story-flex">
            <div class="story-img"><img src="1(1).png" alt="HJ LOGO"></div>
            <div class="story-text">
                <h2 id="hj-title">The HJ Story</h2>
                <p id="hj-desc"></p>
                <div class="milestone-container">
                    <div class="milestone-item">
                        <span class="milestone-year">2+</span>
                        <span class="milestone-text" id="ms-1">EXPERIENCE YEARS</span>
                    </div>
                    <div class="milestone-item">
                        <span class="milestone-year">100%</span>
                        <span class="milestone-text" id="ms-2">KOREAN AUTHENTIC</span>
                    </div>
                    <div class="milestone-item">
                        <span class="milestone-year">15,000+</span>
                        <span class="milestone-text" id="ms-3">HAPPY CUSTOMERS</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="brand-grid">
        <div class="brand-image"><img src="IMG_5808.jpeg"></div>
        <div class="brand-content">
            <span id="f-tag-sub">Botanical Therapy</span>
            <h3 id="brand-h1">Fraijour</h3>
            <p id="f-desc"></p>
            <a href="https://fraijour.co.kr/" target="_blank" class="btn-visit" id="btn-f">OFFICIAL SITE</a>
        </div>
    </div>

    <div class="brand-grid" style="direction: rtl;">
        <div class="brand-image"><img src="IMG_5805.jpeg"></div>
        <div class="brand-content" style="direction: ltr;">
            <span id="b-tag-sub">Body Ritual</span>
            <h3 id="brand-h2">Bathpa</h3>
            <p id="b-desc"></p>
            <a href="https://www.evascosmetic.com/bathpa" target="_blank" class="btn-visit" id="btn-b">OFFICIAL SITE</a>
        </div>
    </div>

    <div class="brand-grid">
        <div class="brand-image"><img src="IMG_5807.jpeg"></div>
        <div class="brand-content">
            <span id="c-tag-sub">Intensive Hair & Skin Care</span>
            <h3 id="brand-h3">Char Char</h3>
            <p id="c-desc"></p>
            <a href="https://www.evascosmetic.com/charchar" target="_blank" class="btn-visit" id="btn-c">OFFICIAL SITE</a>
        </div>
    </div>
</div>

<footer>
    <div class="copy">© 2024 HJ COSMETICS GLOBAL. ALL RIGHTS RESERVED.</div>
</footer>

<script>
    const languages = ['th', 'en', 'kr'];
    let currentLang = localStorage.getItem('hj_lang') || 'th';

    const trans = {
        th: { 
            heroTitle: "มรดกแห่งความงาม", hjTitle: "เรื่องราวของ HJ", 
            hjDesc: "HJ COSMETICS ก่อตั้งขึ้นจากความมุ่งมั่นที่จะนำความงามที่แท้จริงจากเกาหลีมาสู่ประเทศไทย เราคัดสรรสกินแคร์ที่ผ่านการทดสอบทางวิทยาศาสตร์ เพื่อมอบผลลัพธ์ที่ดีที่สุดสำหรับผิวคุณ", 
            ms1: "ปีแห่งประสบการณ์", ms2: "นำเข้าจากเกาหลี 100%", ms3: "ลูกค้าที่ไว้วางใจ",
            fDesc: "แบรนด์ที่เชี่ยวชาญด้าน Botanical Therapy เน้นการใช้สารสกัดจากพืชพรรณธรรมชาติในการฟื้นฟูผิวอย่างอ่อนโยน", 
            bDesc: "เปลี่ยนการดูแลผิวกายในทุกวันให้กลายเป็นพิธีกรรมแห่งความสุขระดับสปาด้วยกลิ่นหอมและสารบำรุงที่เป็นเอกลักษณ์", 
            cDesc: "ผู้นำด้านผลิตภัณฑ์ดูแลเส้นผมและผิวสูตรเข้มข้น มอบผลลัพธ์ดุจทำทรีทเมนท์ระดับมืออาชีพ",
            visit: "เข้าชมเว็บไซต์"
        },
        en: { 
            heroTitle: "Our Heritage", hjTitle: "The HJ Story", 
            hjDesc: "Established with a visionary commitment to bridge Korean beauty excellence with Thailand. We curate science-backed skincare to deliver excellence to your skin.", 
            ms1: "EXPERIENCE YEARS", ms2: "KOREAN AUTHENTIC", ms3: "HAPPY CUSTOMERS",
            fDesc: "Specializing in Botanical Therapy, Fraijour harnesses natural herbs for deep restoration and balance.", 
            bDesc: "Elevate your daily ritual into a spa escape with unique scents and intensive nourishment.", 
            cDesc: "A pioneer in intensive hair & skin care solutions with professional-grade treatments.",
            visit: "OFFICIAL SITE"
        },
        kr: { 
            heroTitle: "아름다운 유산", hjTitle: "HJ 코스메틱 이야기", 
            hjDesc: "HJ COSMETICS는 한국의 진정한 아름다움을 태국에 전달하기 위해 설립되었습니다. 우리는 과학적으로 검증된 스킨케어 제품만을 엄선하여 최상의 결과를 제공합니다.", 
            ms1: "경력 년수", ms2: "100% 한국 정품", ms3: "신뢰하는 고객들",
            fDesc: "프라이주어는 식물 테라피 전문 브랜드로, 자연의 치유력을 활용하여 피부 본연의 힘을 기릅니다.", 
            bDesc: "일상의 목욕 시간을 프리미엄 스파와 같은 휴식으로 바꿔주는 감각적인 바디 케어 브랜드입니다.", 
            cDesc: "고농축 추출물을 통해 손상된 모발과 피부를 회복시키는 전문 케어 솔루션입니다.",
            visit: "공식 사이트"
        }
    };

    function updateContent() {
        const l = trans[currentLang];
        document.getElementById('hero-title').textContent = l.heroTitle;
        document.getElementById('hj-title').textContent = l.hjTitle;
        document.getElementById('hj-desc').textContent = l.hjDesc;
        document.getElementById('ms-1').textContent = l.ms1;
        document.getElementById('ms-2').textContent = l.ms2;
        document.getElementById('ms-3').textContent = l.ms3;
        document.getElementById('f-desc').textContent = l.fDesc;
        document.getElementById('b-desc').textContent = l.bDesc;
        document.getElementById('c-desc').textContent = l.cDesc;
        document.querySelectorAll('.btn-visit').forEach(b => b.textContent = l.visit);
        document.getElementById('langBtn').textContent = currentLang.toUpperCase();
        
        const heroTitle = document.getElementById('hero-title');
        if (currentLang === 'th') {
            document.body.style.fontFamily = 'var(--font-th)';
            heroTitle.style.fontFamily = 'var(--font-th)';
        } else if (currentLang === 'kr') {
            document.body.style.fontFamily = 'var(--font-kr)';
            heroTitle.style.fontFamily = 'var(--font-kr)';
        } else {
            document.body.style.fontFamily = 'var(--font-en)';
            heroTitle.style.fontFamily = 'var(--font-head)';
        }
        localStorage.setItem('hj_lang', currentLang);
    }

    function rotateLanguage() {
        currentLang = languages[(languages.indexOf(currentLang) + 1) % languages.length];
        updateContent();
    }

    updateContent();
</script>
</body>
</html>
