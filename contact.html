<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Us - HJ COSMETICS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+Thai:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --off-white: #fdfaf5;
            --font-th: 'Noto Serif Thai', serif;
            --font-en: 'Inter', sans-serif;
            --font-head: 'Cinzel', serif;
            --font-kr: 'Nanum Myeongjo', serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            margin: 0; padding: 0; background-color: var(--off-white); color: #2d3436; 
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
            font-family: var(--font-th);
        }

        /* --- 🎞️ Background --- */
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; opacity: 0.4; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(253,250,245,0.1) 0%, rgba(253,250,245,0.6) 100%); z-index: -1; }

        /* --- 🎖️ Navigation (Fully Responsive) --- */
        nav { 
            background: rgba(255, 255, 255, 0.9); height: 80px; padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .logo-nav img { height: clamp(35px, 5vh, 45px); }
        
        .nav-links { display: flex; gap: clamp(15px, 3vw, 30px); align-items: center; }
        .nav-links a { text-decoration: none; color: var(--p-green); font-family: var(--font-en); font-weight: 600; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a.active { color: var(--gold); }

        .mobile-menu-btn { display: none; font-size: 1.5rem; color: var(--p-green); cursor: pointer; }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-links { 
                display: none; position: absolute; top: 80px; left: 0; width: 100%; 
                background: white; flex-direction: column; padding: 30px 0; gap: 25px;
                border-bottom: 2px solid var(--gold);
            }
            .nav-links.active { display: flex; }
        }

        .lang-btn { background: var(--p-green); color: white; border: none; padding: 8px 15px; cursor: pointer; font-family: var(--font-en); font-weight: 700; font-size: 0.7rem; border-radius: 4px; }

        /* --- ✨ Header --- */
        .hero-header { text-align: center; padding: clamp(40px, 8vh, 70px) 5% 20px; }
        .hero-header h1 { 
            font-size: clamp(2rem, 6vw, 3.5rem); 
            color: var(--p-green); 
            letter-spacing: 4px; font-weight: 700;
        }

        /* --- 📝 Main Content --- */
        .contact-container { width: 92%; max-width: 1200px; margin: 0 auto 60px; flex: 1; }
        .contact-grid { 
            display: grid; grid-template-columns: 0.8fr 1.2fr; gap: clamp(20px, 5vw, 50px); 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: clamp(25px, 5vw, 60px); border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 50px rgba(0,0,0,0.06);
        }
        
        .info-card h2 { font-size: clamp(1.8rem, 3vw, 2.2rem); color: var(--p-green); margin-bottom: 30px; font-weight: 700; }
        .info-item { margin-bottom: 30px; }
        .info-item h4 { color: var(--gold); margin-bottom: 8px; font-size: 0.8rem; letter-spacing: 2px; font-family: var(--font-head); }
        .info-item p { color: #333; line-height: 1.6; font-size: 0.95rem; margin: 5px 0; }
        .info-item i { color: var(--p-green); width: 25px; margin-right: 5px; }

        /* --- Form --- */
        .form-card { background: rgba(255, 255, 255, 0.5); padding: clamp(20px, 4vw, 40px); border-radius: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: var(--p-green); font-weight: 700; letter-spacing: 1px; }
        input, textarea { 
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); 
            background: rgba(255,255,255,0.8); font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); background: #fff; }

        .btn-submit { 
            background: var(--p-green); color: white; border: none; padding: 18px; width: 100%; 
            font-weight: 700; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; 
            border-radius: 8px; font-size: 0.85rem; transition: 0.3s;
        }
        .btn-submit:hover { background: #143326; transform: translateY(-3px); }

        /* --- 🏛️ Footer --- */
        footer { padding: 40px 0; text-align: center; }
        .copy { font-size: 0.7rem; color: #888; letter-spacing: 1px; font-family: var(--font-en); }

        @media (max-width: 900px) {
            .contact-grid { grid-template-columns: 1fr; }
            .info-card h2, .info-item { text-align: center; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

<video autoplay muted loop playsinline id="bg-video"><source src="วิดีโอทำเว็บไซต์.mp4" type="video/mp4"></video>
<div class="bg-overlay"></div>

<nav>
    <div class="logo-nav"><a href="index.html"><img src="HJ (5).png" alt="HJ LOGO"></a></div>
    
    <div class="mobile-menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <button onclick="rotateLanguage()" id="langBtn" class="lang-btn">TH</button>
    </div>
</nav>

<header class="hero-header">
    <h1 id="hero-title">Contact Us</h1>
</header>

<div class="contact-container">
    <div class="contact-grid">
        <div class="info-card">
            <h2 id="info-h">Get In Touch</h2>
            <div class="info-item">
                <h4 id="h-addr-label">ADDRESS</h4>
                <p id="p-addr">323/11-12 Moo 3, Bowin,<br>Sriracha, Chon Buri 20230, Thailand</p>
            </div>
            <div class="info-item">
                <h4 id="h-cont-label">CONCIERGE</h4>
                <p><i class="fa-brands fa-line"></i> thaihj11</p>
                <p><i class="fa-solid fa-phone"></i> 03-8182-577</p>
                <p><i class="fa-solid fa-envelope"></i> thaihjglobal@gmail.com</p>
            </div>
        </div>
        
        <div class="form-card">
            <form action="https://formspree.io/f/xzddzvby" method="POST">
                <div class="form-group">
                    <label id="l-name">NAME</label>
                    <input type="text" name="name" id="ph-name" required>
                </div>
                <div class="form-group">
                    <label id="l-email">EMAIL</label>
                    <input type="email" name="email" id="ph-email" required>
                </div>
                <div class="form-group">
                    <label id="l-msg">MESSAGE</label>
                    <textarea name="message" id="ph-msg" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-submit" id="btn-send">Send Message</button>
            </form>
        </div>
    </div>
</div>

<footer>
    <div class="copy">© 2024 HJ COSMETICS GLOBAL. ALL RIGHTS RESERVED.</div>
</footer>

<script>
    function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('active');
    }

    const languages = ['th', 'en', 'kr'];
    let currentLang = localStorage.getItem('hj_lang') || 'th';

    const trans = {
        th: { 
            heroTitle: "ติดต่อเรา", infoH: "ช่องทางการติดต่อ", 
            hAddr: "ที่อยู่", hCont: "ฝ่ายบริการ", lName: "ชื่อ-นามสกุล", lEmail: "อีเมล", lMsg: "ข้อความ", 
            btnSend: "ส่งข้อความ", phName: "ชื่อของคุณ", phEmail: "อีเมลติดต่อ", phMsg: "พิมพ์ข้อความที่นี่..."
        },
        en: { 
            heroTitle: "Contact Us", infoH: "Get In Touch", 
            hAddr: "ADDRESS", hCont: "CONCIERGE", lName: "YOUR NAME", lEmail: "EMAIL", lMsg: "MESSAGE", 
            btnSend: "SEND MESSAGE", phName: "Your name", phEmail: "Your email", phMsg: "Write message..."
        },
        kr: { 
            heroTitle: "문의하기", infoH: "연락처", 
            hAddr: "주소", hCont: "고객 서비스", lName: "성함", lEmail: "이메일", lMsg: "메시지", 
            btnSend: "보내기", phName: "이름", phEmail: "이메일", phMsg: "메시지..."
        }
    };

    function updateContent() {
        const l = trans[currentLang];
        document.getElementById('hero-title').textContent = l.heroTitle;
        document.getElementById('info-h').textContent = l.infoH;
        document.getElementById('h-addr-label').textContent = l.hAddr;
        document.getElementById('h-cont-label').textContent = l.hCont;
        document.getElementById('l-name').textContent = l.lName;
        document.getElementById('l-email').textContent = l.lEmail;
        document.getElementById('l-msg').textContent = l.lMsg;
        document.getElementById('btn-send').textContent = l.btnSend;
        document.getElementById('langBtn').textContent = currentLang.toUpperCase();
        
        if (currentLang === 'kr') {
            document.body.style.fontFamily = 'var(--font-kr)';
        } else {
            document.body.style.fontFamily = currentLang === 'th' ? 'var(--font-th)' : 'var(--font-en)';
        }
        localStorage.setItem('hj_lang', currentLang);
    }

    function rotateLanguage() {
        currentLang = languages[(languages.indexOf(currentLang) + 1) % languages.length];
        updateContent();
    }

    updateContent();
</script>
</body>
</html>
