<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - HJ COSMETICS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@300;400;500;600&family=Inter:wght@400;600;700&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root { 
            --p-green: #1b4332; --gold: #c5a059; --off-white: #fdfaf5; --border-color: #e0e0e0;
            --font-th: 'Prompt', sans-serif; --font-en: 'Inter', sans-serif; --font-head: 'Cinzel', serif; --font-kr: 'Nanum Myeongjo', serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-user-select: none; user-select: none; }
        img { -webkit-touch-callout: none; pointer-events: none; }
        body { margin: 0; padding: 0; background-color: var(--off-white); color: #2d3436; min-height: 100vh; transition: font-family 0.3s ease; }

        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.5; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(253,250,245,0.1) 0%, rgba(253,250,245,0.6) 100%); z-index: -1; }

        nav { background: rgba(255, 255, 255, 0.8); height: 80px; padding: 0 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .logo-nav img { height: 45px; pointer-events: auto; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--p-green); font-weight: 600; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-en); pointer-events: auto; }
        .lang-btn { background: var(--p-green); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: 700; font-size: 0.7rem; border-radius: 2px; pointer-events: auto; }

        .container { max-width: 1200px; margin: 30px auto 80px; padding: 0 5%; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: start; }
        
        .img-display { background: rgba(255, 255, 255, 0.3); padding: 40px 30px; border-radius: 25px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); box-shadow: 0 20px 60px rgba(0,0,0,0.08); position: sticky; top: 100px; display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255, 255, 255, 0.5); }
        .img-display img { width: 90%; max-width: 450px; height: auto; margin-bottom: 25px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.12)); }

        .sale-badge { position: absolute; top: 25px; right: 25px; background: #ff4757; color: white; font-family: var(--font-en); font-weight: 800; font-size: 0.85rem; padding: 8px 15px; border-radius: 30px; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); letter-spacing: 1px; animation: pulse 1.5s infinite; display: none; z-index: 10; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .price-on-sale { color: #ff4757 !important; }

        .p-slogan { font-size: 1.1rem; color: var(--p-green); font-weight: 600; text-align: center; line-height: 1.5; max-width: 90%; letter-spacing: -0.01em; }
        .p-slogan::after { content: ""; display: block; width: 40px; height: 3px; background: var(--gold); margin: 15px auto 0; border-radius: 10px; }

        .brand-label { color: var(--gold); letter-spacing: 4px; font-weight: 700; font-family: var(--font-head); font-size: 0.75rem; margin: 0; }
        h1 { font-family: var(--font-head); font-size: 1.6rem; color: var(--p-green); margin: 12px 0; line-height: 1.2; }
        .price-tag { font-size: 1.8rem; font-weight: 700; color: var(--p-green); margin-bottom: 25px; font-family: var(--font-en); transition: 0.3s; }
        .price-tag .old { font-size: 1rem; color: #b2bec3; text-decoration: line-through; margin-left: 10px; font-weight: 300; }

        .license-box { border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 15px 0; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .fda-text h4 { margin: 0; font-size: 0.55rem; color: #95a5a6; letter-spacing: 1px; }
        .fda-text p { margin: 3px 0 0; font-weight: 700; font-size: 0.85rem; color: #444; }
        .btn-cert { color: var(--gold); text-decoration: none; font-size: 0.65rem; font-weight: 800; border: 1.5px solid var(--gold); padding: 5px 12px; border-radius: 4px; pointer-events: auto; transition: 0.3s; }
        .btn-cert:hover { background: var(--gold); color: white; }

        .desc-section { margin-bottom: 25px; }
        .desc-section h3 { font-family: var(--font-head); font-size: 0.75rem; color: var(--p-green); margin-bottom: 10px; letter-spacing: 1px; border-left: 4px solid var(--gold); padding-left: 12px; }
        .desc-section p { font-size: 0.85rem; line-height: 1.7; color: #444; margin: 0; white-space: pre-line; user-select: text; }

        .review-form-box { background: rgba(255, 255, 255, 0.4); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px; pointer-events: auto; display: none; }
        .review-form-group { display: flex; gap: 10px; margin-bottom: 8px; }
        .review-form-box input, .review-form-box select, .review-form-box textarea { background: rgba(255,255,255,0.8); border: 1px solid var(--border-color); padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; font-family: inherit; outline: none; color: #333; -webkit-user-select: text; user-select: text; }
        .review-form-box input { flex: 2; }
        .review-form-box select { flex: 1; color: #f1c40f; font-weight: bold; }
        .review-form-box textarea { width: 100%; height: 60px; resize: none; margin-bottom: 8px; }
        .btn-submit-review { width: 100%; background: var(--p-green); color: white; border: none; padding: 10px; font-weight: 700; font-size: 0.75rem; letter-spacing: 1px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-submit-review:hover { background: #122d22; }

        .review-box { background: rgba(255, 255, 255, 0.5); padding: 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); margin-top: 15px; }
        .review-item { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 12px 0; }
        .review-item:last-child { border: none; }
        .stars { color: #f1c40f; font-size: 0.7rem; margin-bottom: 6px; }
        .review-text { font-size: 0.85rem; color: #333; font-weight: 500; }
        .reviewer { display: block; font-size: 0.65rem; color: #95a5a6; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }

        .btn-action { display: flex; align-items: center; justify-content: center; gap: 8px; background: #06C755; color: white; padding: 16px; text-decoration: none; font-weight: 700; font-size: 0.85rem; margin-top: 25px; border-radius: 8px; pointer-events: auto; transition: 0.3s; }
        .btn-action:hover { background: #05b34c; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(6,199,85,0.2); }
        .market-links { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
        .m-btn { padding: 12px; border-radius: 6px; text-align: center; color: white; font-weight: 700; font-size: 0.65rem; text-decoration: none; pointer-events: auto; transition: 0.3s; }
        
        .product-nav-container { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 12px; }
        .nav-p-btn { flex: 1; padding: 12px; border: 1.5px solid var(--p-green); color: var(--p-green); cursor: pointer; font-size: 0.65rem; font-weight: 700; text-align: center; transition: 0.3s; background: transparent; border-radius: 4px; }
        .back-to-home { display: inline-flex; align-items: center; gap: 8px; color: var(--p-green); text-decoration: none; font-size: 0.75rem; font-weight: 700; margin-bottom: 30px; letter-spacing: 1px; }

        footer { background: #1a1a1a; color: #7f8c8d; padding: 40px 5%; text-align: center; font-size: 0.7rem; border-top: 1px solid #333; }
        
        @media (max-width: 1000px) { 
            .container { grid-template-columns: 1fr; gap: 25px; } 
            .img-display { position: static; padding: 30px 20px; } 
            .p-slogan { font-size: 1rem; }
            h1 { font-size: 1.4rem; }
            .price-tag { font-size: 1.6rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<video autoplay muted loop playsinline id="bg-video"><source src="วิดีโอทำเว็บไซต์.mp4" type="video/mp4"></video>
<div class="bg-overlay"></div>

<nav>
    <div class="logo-nav"><a href="index.html"><img src="HJ (5).png"></a></div>
    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </div>
    <button onclick="changeLang()" id="langBtn" class="lang-btn">TH</button>
</nav>

<div class="container">
    <div class="img-display">
        <div id="sale-badge" class="sale-badge"><i class="fas fa-fire"></i> FLASH SALE</div>
        <img id="p-img" src="">
        <div id="p-slogan" class="p-slogan"></div>
    </div>
    <div class="p-info">
        <a onclick="history.back()" class="back-to-home"><i class="fas fa-chevron-left"></i> BACK TO COLLECTIONS</a>
        <div class="product-nav-container">
            <button id="prev-btn" class="nav-p-btn"><i class="fas fa-arrow-left"></i> PREVIOUS</button>
            <button id="next-btn" class="nav-p-btn">NEXT <i class="fas fa-arrow-right"></i></button>
        </div>

        <p class="brand-label" id="p-brand"></p>
        <h1 id="p-name"></h1>
        <div class="price-tag"><span id="p-sale"></span> <span class="old" id="p-old"></span></div>

        <div class="license-box">
            <div class="fda-text"><h4>REGISTRATION NO.</h4><p id="p-fda"></p></div>
            <a href="#" id="p-cert" target="_blank" class="btn-cert">CERTIFICATE</a>
        </div>

        <div class="desc-section"><h3>PRODUCT DETAILS</h3><p id="p-desc"></p></div>
        <div class="desc-section"><h3>HOW TO USE</h3><p id="p-use"></p></div>
        
        <div class="desc-section">
            <h3 style="cursor: pointer; text-decoration: underline;" onclick="document.getElementById('reviewForm').style.display='block';">REVIEWS (คลิกเพื่อเขียนรีวิว)</h3>
            <form id="reviewForm" class="review-form-box" onsubmit="submitReview(event)">
                <div class="review-form-group">
                    <input type="text" id="revName" placeholder="ชื่อของคุณ" required>
                    <input type="text" id="revOrder" placeholder="เลขที่คำสั่งซื้อ" required>
                </div>
                <div class="review-form-group">
                    <select id="revRating">
                        <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                        <option value="4">⭐⭐⭐⭐ (4)</option>
                        <option value="3">⭐⭐⭐ (3)</option>
                        <option value="2">⭐⭐ (2)</option>
                        <option value="1">⭐ (1)</option>
                    </select>
                </div>
                <textarea id="revText" placeholder="เขียนความเห็นของคุณเกี่ยวกับสินค้าชิ้นนี้..." required></textarea>
                <button type="submit" class="btn-submit-review">SEND REVIEW</button>
            </form>
            <div id="p-reviews" class="review-box"></div>
        </div>

        <a href="https://line.me/ti/p/9wSfM2gkuA" target="_blank" class="btn-action"><i class="fab fa-line"></i> ORDER VIA LINE OFFICIAL</a>
        <div class="market-links">
            <a href="https://shopee.co.th/hj_cosmetics" target="_blank" class="m-btn" style="background:#ee4d2d">SHOPEE</a>
            <a href="https://www.lazada.co.th/shop/hj-cosmetics/" target="_blank" class="m-btn" style="background:#10156d">LAZADA</a>
            <a href="https://vt.tiktok.com/ZMkJ5PWfF/" target="_blank" class="m-btn" style="background:#000">TIKTOK</a>
        </div>
    </div>
</div>

<footer>&copy; 2024 HJ COSMETICS GLOBAL. ALL RIGHTS RESERVED.</footer>

<script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    const products = { /* ข้อมูลเดิมของคุณ */ };
    // ... (ใส่ออบเจกต์ products ตัวเต็มของคุณไว้ที่นี่เหมือนเดิม)

    function renderReviews(product) {
        const reviewBox = document.getElementById('p-reviews');
        let html = product.th.reviews.map(r => `<div class="review-item"><div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div><div class="review-text">"${r.split(' - ')[0]}"</div><span class="reviewer">${r.split(' - ')[1]}</span></div>`).join('');
        const customReviews = JSON.parse(localStorage.getItem(`reviews_prod_${currentId}`)) || [];
        customReviews.forEach(rev => {
            let starIcons = '';
            for(let i=1; i<=5; i++) { starIcons += i <= rev.rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>'; }
            html += `<div class="review-item"><div class="stars">${starIcons}</div><div class="review-text">"${rev.text}"</div><span class="reviewer">- ${rev.name}</span></div>`;
        });
        reviewBox.innerHTML = html;
    }

    function submitReview(e) {
        e.preventDefault();
        const newReview = {
            name: document.getElementById('revName').value.trim(),
            orderId: document.getElementById('revOrder').value.trim(),
            rating: parseInt(document.getElementById('revRating').value),
            text: document.getElementById('revText').value.trim()
        };
        const customReviews = JSON.parse(localStorage.getItem(`reviews_prod_${currentId}`)) || [];
        customReviews.push(newReview);
        localStorage.setItem(`reviews_prod_${currentId}`, JSON.stringify(customReviews));
        document.getElementById('revName').value = '';
        document.getElementById('revOrder').value = '';
        document.getElementById('revText').value = '';
        document.getElementById('reviewForm').style.display = 'none';
        renderReviews(products[currentId]);
        alert("ขอบคุณครับ! รีวิวของคุณถูกบันทึกแล้ว");
    }

    // ฟังก์ชัน render และอื่นๆ ให้คงเดิมตามโค้ดของคุณ
</script>
</body>
</html>
