    let lang = localStorage.getItem('selectedLang') || 'th';

    let currentId = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;



    function render() {

        const p = products[currentId] || products[1];

        const content = p[lang] || p['th'];



        document.getElementById('p-img').src = p.img;

        document.getElementById('p-slogan').innerText = content.slogan;

        document.getElementById('p-brand').innerText = p.brand;

        document.getElementById('p-name').innerText = content.name;



        // 🔴 ระบบป้ายลดราคาตามสินค้าที่เลือก

        const isSaleItem = [5, 10, 11, 12, 13, 14, 15].includes(currentId);

        const saleBadge = document.getElementById('sale-badge');

        const priceTagElement = document.getElementById('p-sale');



        if (isSaleItem) {

            saleBadge.style.display = 'block';

            priceTagElement.classList.add('price-on-sale');

        } else {

            saleBadge.style.display = 'none';

            priceTagElement.classList.remove('price-on-sale');

        }



        priceTagElement.innerText = p.sale;

        document.getElementById('p-old').innerText = p.old;

        document.getElementById('p-fda').innerText = p.fda;

        document.getElementById('p-cert').href = p.cert;

        document.getElementById('p-desc').innerText = content.desc;

        document.getElementById('p-use').innerText = content.use;



        // 🆕 ระบบแสดงผลรีวิว (ดั้งเดิม + รีวิวใหม่จาก LocalStorage)

        renderReviews(p);



        const productIds = Object.keys(products).map(Number);

        const currentIndex = productIds.indexOf(currentId);

        const prevId = productIds[currentIndex - 1] || productIds[productIds.length - 1];

        const nextId = productIds[currentIndex + 1] || productIds[0];



        document.getElementById('prev-btn').onclick = () => location.replace(`?id=${prevId}`);

        document.getElementById('next-btn').onclick = () => location.replace(`?id=${nextId}`);



        document.getElementById('langBtn').innerText = lang.toUpperCase();



        const bodyFont = lang === 'th' ? 'var(--font-th)' : (lang === 'kr' ? 'var(--font-kr)' : 'var(--font-en)');

        document.body.style.fontFamily = bodyFont;

        document.getElementById('p-slogan').style.fontFamily = bodyFont;

    }



    // 🆕 ฟังก์ชันช่วย Render รีวิวแยกเพื่ออัปเดตแบบ Dynamic

    function renderReviews(product) {

        const reviewBox = document.getElementById('p-reviews');



        // 1. ดึงรีวิวดั้งเดิมจาก Object

        let html = product.th.reviews.map(r => `

            <div class="review-item">

                <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>

                <div class="review-text">"${r.split(' - ')[0]}"</div>

                <span class="reviewer">${r.split(' - ')[1]}</span>

            </div>

        `).join('');



        // 2. ดึงรีวิวใหม่ที่ผู้ใช้เขียนเพิ่มจาก LocalStorage (แยกตาม ID สินค้า)

        const customReviews = JSON.parse(localStorage.getItem(`reviews_prod_${currentId}`)) || [];

        customReviews.forEach(rev => {

            let starIcons = '';

            for(let i=1; i<=5; i++) {

                starIcons += i <= rev.rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>';

            }

            html += `

                <div class="review-item">

                    <div class="stars">${starIcons}</div>

                    <div class="review-text">"${rev.text}"</div>

                    <span class="reviewer">- ${rev.name}</span>

                </div>

            `;

        });



        reviewBox.innerHTML = html;

    }

        const textInput = document.getElementById('revText');



        const newReview = {

            name: nameInput.value.trim(),

            rating: parseInt(ratingInput.value),

            text: textInput.value.trim()

        };



        // บันทึกลง LocalStorage ตาม ID สินค้าปัจจุบัน

        const customReviews = JSON.parse(localStorage.getItem(`reviews_prod_${currentId}`)) || [];

        customReviews.push(newReview);

        localStorage.setItem(`reviews_prod_${currentId}`, JSON.stringify(customReviews));



        // เคลียร์ค่าในฟอร์ม

        nameInput.value = '';

        textInput.value = '';

        ratingInput.value = '5';



        // รี Render หน้าจอรีวิวทันที

        const p = products[currentId] || products[1];

        renderReviews(p);

    }



    function changeLang() {

        const flow = { th: 'en', en: 'kr', kr: 'th' };

        lang = flow[lang];

        localStorage.setItem('selectedLang', lang);

        render();

    }

    render();

</script>

</body>

</html>
