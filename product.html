<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - HJ COSMETICS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@300;400;500;600&family=Inter:wght@400;600;700&family=Nanum+Myeongjo:wght@400;700&display=swap');
        :root { --p-green: #1b4332; --gold: #c5a059; --off-white: #fdfaf5; --border-color: #e0e0e0; }
        body { margin: 0; padding: 0; background-color: var(--off-white); color: #2d3436; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 5%; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; }
        .review-form-box { background: rgba(255, 255, 255, 0.4); padding: 15px; border-radius: 12px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="img-display">
        <img id="p-img" src="">
        <div id="p-slogan" class="p-slogan"></div>
    </div>
    <div class="p-info">
        <h1 id="p-name"></h1>
        <div class="price-tag"><span id="p-sale"></span> <span class="old" id="p-old"></span></div>
        <p id="p-desc"></p>
        
        <div class="desc-section">
            <h3 style="cursor: pointer; text-decoration: underline;" onclick="document.getElementById('reviewForm').style.display='block';">REVIEWS (คลิกเพื่อเขียนรีวิว)</h3>
            <form id="reviewForm" class="review-form-box" onsubmit="submitReview(event)">
                <input type="text" id="revName" placeholder="ชื่อของคุณ" required>
                <input type="text" id="revOrder" placeholder="กรอกเลขที่คำสั่งซื้อ" required>
                <select id="revRating"><option value="5">5 ดาว</option></select>
                <textarea id="revText" placeholder="ความเห็นของคุณ..." required></textarea>
                <button type="submit">SEND REVIEW</button>
            </form>
            <div id="p-reviews" class="review-box"></div>
        </div>
    </div>
</div>

<script>
    // 1. นำข้อมูลสินค้า (products) ชุดเดิมของคุณมาวางที่นี่
    const products = {
        1: { brand: "FRAIJOUR", sale: "฿330", old: "฿420", img: "watary2.png", fda: "20-2-6700030346", cert: "WATERY CREAM.jpg", th: { name: "Original Herb Wormwood Calming Watery Cream", slogan: "ปรนนิบัติผิวด้วยความชุ่มชื้น", desc: "รายละเอียดสินค้า...", use: "วิธีใช้...", reviews: ["เนื้อดีมาก - ลูกค้า1"] } }
        // ... เติมสินค้าที่เหลือของคุณตามปกติ
    };

    // 2. ฟังก์ชัน render เดิมของคุณ (คงเดิมไว้)
    let currentId = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
    let lang = 'th';

    function render() {
        const p = products[currentId];
        if (!p) return;
        document.getElementById('p-img').src = p.img;
        document.getElementById('p-name').innerText = p.th.name;
        document.getElementById('p-sale').innerText = p.sale;
        document.getElementById('p-old').innerText = p.old;
        document.getElementById('p-desc').innerText = p.th.desc;
        renderReviews(p);
    }

    // 3. ปรับปรุงแค่ฟังก์ชันส่งรีวิวให้เก็บค่า revOrder เพิ่มเข้าไป
    function submitReview(e) {
        e.preventDefault();
        const newReview = {
            name: document.getElementById('revName').value,
            orderId: document.getElementById('revOrder').value, // เก็บเลขออเดอร์
            rating: document.getElementById('revRating').value,
            text: document.getElementById('revText').value
        };
        const customReviews = JSON.parse(localStorage.getItem(`reviews_prod_${currentId}`)) || [];
        customReviews.push(newReview);
        localStorage.setItem(`reviews_prod_${currentId}`, JSON.stringify(customReviews));
        
        alert("ขอบคุณสำหรับรีวิวครับ");
        document.getElementById('reviewForm').style.display = 'none';
        render();
    }

    function renderReviews(product) {
        // (ฟังก์ชัน renderReviews เดิมของคุณ)
    }

    render();
</script>
</body>
</html>
