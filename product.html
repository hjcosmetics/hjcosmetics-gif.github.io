    };

    let lang = localStorage.getItem('selectedLang') || 'th';
    let currentId = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;

    function render() {
        const p = products[currentId] || products[1];
        const content = p[lang] || p['th'];
        
        document.getElementById('p-img').src = p.img;
        document.getElementById('p-brand').innerText = p.brand;
        document.getElementById('p-name').innerText = content.name;
        document.getElementById('p-sale').innerText = p.sale;
        document.getElementById('p-old').innerText = p.old;
        document.getElementById('p-fda').innerText = p.fda;
        document.getElementById('p-cert').href = p.cert;
        document.getElementById('p-desc').innerText = content.desc;
        document.getElementById('p-use').innerText = content.use;

        const reviewBox = document.getElementById('p-reviews');
        reviewBox.innerHTML = p.th.reviews.map(r => `
            <div class="review-item">
                <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                <div class="review-text">"${r.split(' - ')[0]}"</div>
                <span class="reviewer">${r.split(' - ')[1]}</span>
            </div>
        `).join('');

        // 🆕 ตั้งค่าปุ่มนำทางแบบเปลี่ยน URL โดยไม่บันทึก History ใหม่
        const productIds = Object.keys(products).map(Number);
        const currentIndex = productIds.indexOf(currentId);
        const prevId = productIds[currentIndex - 1] || productIds[productIds.length - 1];
        const nextId = productIds[currentIndex + 1] || productIds[0];
        
        document.getElementById('prev-btn').onclick = () => location.replace(`?id=${prevId}`);
        document.getElementById('next-btn').onclick = () => location.replace(`?id=${nextId}`);

        document.getElementById('langBtn').innerText = lang.toUpperCase();
        document.body.style.fontFamily = lang === 'th' ? 'var(--font-th)' : (lang === 'kr' ? 'var(--font-kr)' : 'var(--font-en)');
    }

    function changeLang() {
        const flow = { th: 'en', en: 'kr', kr: 'th' };
        lang = flow[lang];
        localStorage.setItem('selectedLang', lang);
        render();
    }
    render();
</script>
