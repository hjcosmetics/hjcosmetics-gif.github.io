<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HJ COSMETICS | Premium Luxury Curator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@200;300;400;500&family=Montserrat:wght@300;600;800&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --sale-red: #e63946;
            --off-white: #fdfaf5;
            --font-th: 'Prompt', sans-serif;
            --font-en: 'Montserrat', sans-serif;
            --font-head: 'Cinzel', serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { background-color: var(--off-white); color: #2d3436; font-family: var(--font-th); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        /* --- Nav --- */
        nav { background: rgba(255, 255, 255, 0.95); height: 70px; padding: 0 4%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .logo-nav img { height: 35px; width: auto; }
        .nav-links { display: flex; gap: clamp(8px, 2.5vw, 25px); align-items: center; }
        .nav-links a { text-decoration: none; color: var(--p-green); font-weight: 600; font-size: 0.65rem; letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--font-en); white-space: nowrap; }
        .lang-btn { background: var(--p-green); color: white; border: none; padding: 6px 10px; cursor: pointer; font-weight: 700; font-size: 0.65rem; border-radius: 4px; }

        /* --- Hero & Slider --- */
        .hero { padding: 30px 5% 15px; text-align: center; }
        .main-gold-logo { width: 100%; max-width: 240px; }
        .slider-container { width: 92%; max-width: 1400px; margin: 0 auto 20px; aspect-ratio: 16/8; overflow: hidden; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* --- Video & Brands --- */
        .video-section { width: 92%; max-width: 1000px; margin: 20px auto; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .brand-partners { padding: 20px 5%; display: flex; justify-content: center; align-items: center; gap: clamp(15px, 4vw, 50px); flex-wrap: wrap; margin-bottom: 20px; }
        .brand-partners img { height: 25px; filter: grayscale(1); opacity: 0.6; }
        .brand-partners img.large-logo { height: 40px; }

        /* --- Product Grid --- */
        .container { width: 94%; max-width: 1400px; margin: 0 auto; flex: 1; }
        .grid-title { margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        .grid-title h2 { font-family: var(--font-head); font-size: 1rem; color: var(--p-green); letter-spacing: 1px; }
        .grid-title .line { flex: 1; height: 1px; background: var(--gold); opacity: 0.3; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 50px; }

        /* --- Card --- */
        .card { background: white; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; color: inherit; border: 1px solid rgba(0,0,0,0.05); height: 100%; transition: 0.3s; position: relative; }
        
        /* สไตล์พิเศษสำหรับตัวที่ลดราคา (SALE Highlight) */
        .card.on-sale-highlight { border: 1.5px solid var(--sale-red); box-shadow: 0 0 15px rgba(230, 57, 70, 0.1); }
        .card.on-sale-highlight .product-badge { background: var(--sale-red); animation: pulse 2s infinite; width: 40px; height: 40px; font-size: 0.6rem; }
        .card.on-sale-highlight .sale { color: var(--sale-red); font-size: 1.3rem; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(230, 57, 70, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); }
        }

        .card.sold-out { opacity: 0.7; pointer-events: none; }
        .card.sold-out .img-box img { filter: grayscale(1); }
        .stock-label { position: absolute; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; font-size: 0.7rem; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 4px; z-index: 2; }

        .img-box { 
            width: 100%; 
            background: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            padding: 10px;
        }
        .img-box img { 
            max-width: 100%; 
            height: auto; 
            object-fit: contain; 
        }

        .product-badge { position: absolute; top: 8px; right: 8px; background: var(--gold); color: white; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; font-weight: 800; z-index: 1; transition: 0.3s; }
        
        .info { padding: 10px 8px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
        .info h3 { font-size: 0.75rem; color: var(--p-green); line-height: 1.2; min-height: 2.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .price-group { display: flex; flex-direction: column; align-items: center; margin-bottom: 5px; }
        .sale { font-size: 1.05rem; font-weight: 700; color: var(--p-green); }
        .old { color: #adb5bd; text-decoration: line-through; font-size: 0.65rem; }
        
        .btn-buy { background: var(--p-green); color: white; padding: 10px; text-align: center; font-weight: 700; font-size: 0.65rem; text-transform: uppercase; margin-top: auto; }
        .btn-buy.out { background: #666; }

        @media (min-width: 769px) {
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
            .logo-nav img { height: 45px; }
            .info h3 { font-size: 0.85rem; }
            .sale { font-size: 1.2rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

</div>

    const products = [

        { id: 2, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลามมิ่ง โทนเนอร์", nameEn: "Original Herb Wormwood Calming Toner", nameKr: "오리지널 허브 웜우드 카밍 토너", sale: 350, old: 375, bTh: "ขายดี", bEn: "BEST", bKr: "인기", img: "2.jpeg" },
        { id: 3, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลีนซิ่ง วอเตอร์", nameEn: "Original Herb Wormwood Cleansing Water", nameKr: "오리지널 허브 웜우드 클렌징 워터", sale: 250, old: 400, bTh: "ใหม่", bEn: "NEW", bKr: "신상", img: "3.jpeg" },
        { id: 4, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลีนซิ่ง โฟม", nameEn: "Original Herb Wormwood Cleansing Foam", nameKr: "오리지널 허브 웜우드 클렌징 폼", sale: 290, old: 331, bTh: "สะอาด", bEn: "TOP", bKr: "세정", img: "4.jpeg" },
        // มาส์กหน้า (เพิ่ม SALE)
        { id: 5, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด ชีท มาส์ก", nameEn: "Original Herb Wormwood Sheet Mask", nameKr: "오리지널 허브 웜우드 시트 마스크", sale: 15, old: 22, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "15.jpeg", isPromo: true },
        { id: 6, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ เบลมมิช โทนเนอร์", nameEn: "Heartleaf Blemish Toner", nameKr: "하트리프 블레미쉬 토너", sale: 360, old: 420, bTh: "ลดสิว", bEn: "ACNE", bKr: "트러블", img: "6.jpeg" },
        { id: 7, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ เบลมมิช มอยส์เจอร์ ครีม", nameEn: "Heartleaf Blemish Moisture Cream", nameKr: "하트리프 블레미쉬 모이스처라이저 크림", sale: 290, old: 464, bTh: "ชุ่มชื้น", bEn: "MOIST", bKr: "보습", img: "5.jpeg" },
        { id: 8, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ วอเตอร์ ฟิต กันแดด", nameEn: "Heartleaf Water Fit Sun", nameKr: "하트리프 워터 핏 선크림", sale: 320, old: 500, bTh: "บางเบา", bEn: "LIGHT", bKr: "산뜻", img: "12.jpeg" },
        { id: 9, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ แอรี่ ฟิต กันแดด", nameEn: "Heartleaf Airy Fit Sun", nameKr: "하트리프 에어리 핏 선크림", sale: 280, old: 420, bTh: "คุมมัน", bEn: "MATTE", bKr: "뽀송", img: "11.jpeg" },
        // Retin 4 ตัว (SALE)
        { id: 10, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ โทนเนอร์", nameEn: "Retin-Collagen 3D Core Toner", nameKr: "레틴 콜라겐 3D 코어 토너", sale: 239, old: 420, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "9.jpeg", isPromo: true },
        { id: 11, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ ครีม", nameEn: "Retin-Collagen 3D Core Cream", nameKr: "레틴 콜라겐 3D 코어 크림", sale: 199, old: 420, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "7.jpeg", isPromo: true },
        { id: 12, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ อายครีม", nameEn: "Retin-Collagen 3D Core Eye Cream", nameKr: "레틴 콜라겐 3D 코어 아이크림", sale: 140, old: 331, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "8.jpeg", isPromo: true },
        { id: 13, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ ลิป ออยล์", nameEn: "Retin-Collagen 3D Core Lip Oil", nameKr: "레틴 콜라겐 3D 코어 립 오일", sale: 88, old: 280, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "10.jpeg", isPromo: true },
        // 2 ตัวล่างสุด (เพิ่ม SALE)
        { id: 14, brand: "CharChar", nameTh: "มังบีน ซิก้า คลีนซิ่ง โฟม", nameEn: "Mungbean Cica Cleansing Foam", nameKr: "녹두 시카 클렌징 폼", sale: 99, old: 225, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "14.jpeg", isPromo: true },
        { id: 15, brand: "Bathpa", nameTh: "บอดี้ โทนอัพ ครีม", nameEn: "Body Tone Up Cream", nameKr: "바디 톤업 크림", sale: 99, old: 320, bTh: "SALE", bEn: "SALE", bKr: "SALE", img: "13.jpeg", isPromo: true }
    ];

    let currentLang = localStorage.getItem('selectedLang') || 'en';

    function render() {
        const gf = document.getElementById('grid-f');
        const go = document.getElementById('grid-o');
        if(!gf || !go) return;
        gf.innerHTML = ''; go.innerHTML = '';
        products.forEach(p => {
            const name = currentLang === 'en' ? p.nameEn : (currentLang === 'kr' ? p.nameKr : p.nameTh);
            const badge = currentLang === 'en' ? p.bEn : (currentLang === 'kr' ? p.bKr : p.bTh);
            
            let btnText = currentLang === 'th' ? 'ช้อปเลย' : (currentLang === 'kr' ? '지금 구매' : 'SHOP NOW');
            let soldOutText = currentLang === 'th' ? 'หมดสต็อก' : (currentLang === 'kr' ? '품절' : 'SOLD OUT');
            
            const isOut = p.outOfStock === true;
            const isPromo = p.isPromo === true;
            
            const html = `
                <a href="${isOut ? '#' : 'product.html?id='+p.id}" class="card ${isOut ? 'sold-out' : ''} ${isPromo ? 'on-sale-highlight' : ''}">
                    <div class="img-box">
                        <div class="product-badge">${badge}</div>
                        ${isOut ? `<div class="stock-label">${soldOutText}</div>` : ''}
                        <img src="${p.img}">
                    </div>
                    <div class="info">
                        <h3>${name}</h3>
                        <div class="price-group">
                            <span class="sale">฿${p.sale}</span>
                            <span class="old">฿${p.old}</span>
                        </div>
                    </div>
                    <div class="btn-buy ${isOut ? 'out' : ''}">${isOut ? soldOutText : btnText}</div>
                </a>`;
            if(p.brand === "Fraijour") gf.innerHTML += html; else go.innerHTML += html;
        });
        document.getElementById('langBtn').textContent = currentLang.toUpperCase();
    }
    function changeLang() { currentLang = currentLang === 'th' ? 'en' : (currentLang === 'en' ? 'kr' : 'th'); localStorage.setItem('selectedLang', currentLang); render(); }
    render();
</script>
</body>
</html>
