<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ COSMETICS | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@300;400;500;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ย่อ CSS มาจาก About แต่ตัดส่วนที่ไม่ใช้ทิ้ง */
        :root { --p-green: #1b4332; --gold: #c5a059; --off-white: #fdfaf5; --font-th: 'Prompt', sans-serif; --font-head: 'Cinzel', serif; }
        body { margin: 0; padding: 0; background-color: var(--off-white); font-family: var(--font-th); overflow-x: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.4; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(253,250,245,0.2) 0%, rgba(253,250,245,0.7) 100%); z-index: -1; }
        nav { background: rgba(255, 255, 255, 0.9); height: 80px; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo-nav img { height: 45px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--p-green); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .menu-toggle { display: none; font-size: 1.5rem; color: var(--p-green); cursor: pointer; }
        
        .hero { height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--p-green); padding: 20px; }
        .hero h1 { font-family: var(--font-head); font-size: clamp(2.5rem, 8vw, 5rem); margin: 0; }
        .hero p { letter-spacing: 4px; font-weight: 300; margin-top: 15px; text-transform: uppercase; }
        .btn-main { margin-top: 40px; background: var(--p-green); color: white; padding: 15px 40px; text-decoration: none; border-radius: 5px; font-weight: 700; transition: 0.3s; }
        
        @media (max-width: 1000px) {
            .nav-links { position: fixed; top: 80px; left: -100%; width: 100%; height: calc(100vh - 80px); background: white; flex-direction: column; align-items: center; padding-top: 50px; transition: 0.4s; }
            .nav-links.active { left: 0; }
            .menu-toggle { display: block; }
            .logo-nav img { height: 35px; }
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="วิดีโอทำเว็บไซต์.mp4" type="video/mp4"></video>
    <div class="bg-overlay"></div>
    <nav>
        <div class="logo-nav"><img src="HJ (5).png"></div>
        <div class="nav-links" id="navLinks">
            <a href="index.html" style="color:var(--gold)">Home</a>
            <a href="about.html">About</a>
            <a href="product.html">Product</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </nav>
    <div class="hero">
        <h1>HJ COSMETICS</h1>
        <p>Premium Korean Beauty</p>
        <a href="about.html" class="btn-main">DISCOVER OUR STORY</a>
    </div>
    <script>function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }</script>
</body>
</html>
