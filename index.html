<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HJ COSMETICS | Premium Luxury Curator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@200;300;400;500&family=Montserrat:wght@300;600;800&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --sale-red: #e63946;
            --off-white: #fdfaf5;
            --font-th: 'Prompt', sans-serif;
            --font-en: 'Montserrat', sans-serif;
            --font-head: 'Cinzel', serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        
        body { 
            color: #2d3436; 
            font-family: var(--font-th); 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            position: relative;
            background: #0a1e16; 
        }

        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: #0a1e16;
        }
        .bg-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; 
            min-height: 100vh;
            min-width: 177.77vh; 
            transform: translate(-50%, -50%);
            pointer-events: none; 
        }
        .bg-video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(253, 250, 245, 0.85), rgba(245, 239, 230, 0.9));
        }

        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 31, 23, 0.88); 
            backdrop-filter: blur(25px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 70px 40px 45px;
            border-radius: 60% 40% 55% 45% / 45% 50% 50% 55%;
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.6);
            border: 2px solid var(--gold);
            transform: scale(0.3) rotate(-5deg);
            opacity: 0;
            animation: fluidPopIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #fff 10%, var(--gold) 60%, transparent 100%);
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            animation: floatUp infinite linear;
        }

        .welcome-logo {
            width: 140px;
            position: absolute;
            top: -55px;
            z-index: 5;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            animation: logoFloat 4s ease-in-out infinite alternate;
        }

        .welcome-title {
            font-family: var(--font-head);
            color: var(--p-green);
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-top: 10px;
            margin-bottom: 8px;
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 0.6s ease both 0.5s;
        }

        .welcome-text {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 25px;
            line-height: 1.6;
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 0.6s ease both 0.7s;
        }

        .popup-promo-badge {
            background: linear-gradient(135deg, var(--sale-red), #c31432);
            color: white;
            padding: 12px 30px;
            border-radius: 30px 10px 30px 10px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
            width: 100%;
            z-index: 2;
            box-shadow: 0 10px 25px rgba(230, 57, 70, 0.4);
            animation: pulseBadge 1.8s infinite, fadeInUp 0.6s ease both 0.9s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .welcome-btn {
            background: var(--p-green);
            color: white;
            border: 1px solid var(--gold);
            padding: 14px 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border-radius: 40% 40% 40% 40% / 50% 50% 50% 50%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-family: var(--font-en);
            opacity: 0;
            animation: fadeInUp 0.6s ease both 1.1s;
            z-index: 2;
            box-shadow: 0 5px 20px rgba(27, 67, 50, 0.3);
        }

        .welcome-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(25deg);
            animation: shimmerEffect 3.5s infinite linear;
        }

        .welcome-btn:hover {
            background: var(--gold);
            border-color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.5);
            border-radius: 50px;
        }

        @keyframes fluidPopIn { to { transform: scale(1) rotate(0deg); opacity: 1; } }
        @keyframes logoFloat { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-8px) scale(1.03); } }
        @keyframes floatUp {
            0% { transform: translateY(300px) translateX(0) scale(0.3); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-20px) translateX(15px) scale(1.2); opacity: 0; }
        }
        @keyframes pulseBadge { 0% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 12px 30px rgba(230, 57, 70, 0.6); } 100% { transform: scale(1); } }
        @keyframes shimmerEffect { 0% { left: -60%; } 25% { left: 140%; } 100% { left: 140%; } }
        @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
