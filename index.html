<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HJ COSMETICS | Premium Luxury Curator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@200;300;400;500&family=Montserrat:wght@300;600;800&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --off-white: #fdfaf5;
            --font-th: 'Prompt', sans-serif;
            --font-en: 'Montserrat', sans-serif;
            --font-head: 'Cinzel', serif;
            --font-kr: 'Nanum Myeongjo', serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { background-color: var(--off-white); color: #2d3436; font-family: var(--font-th); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        /* --- Background --- */
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.3; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(253,250,245,0.6) 0%, rgba(253,250,245,0.8) 100%); z-index: -1; }

        /* --- Nav --- */
        nav { background: rgba(255, 255, 255, 0.95); height: 80px; padding: 0 5%; display: flex; align-items: center; position: sticky; top: 0; z-index: 2000; backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .logo-nav { flex: 1; display: flex; align-items: center; }
        .logo-nav img { height: 45px; width: auto; }
        .nav-links { flex: 2; display: flex; gap: 25px; align-items: center; justify-content: center; }
        .nav-links a { text-decoration: none; color: var(--p-green); font-weight: 600; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font-en); }
        .nav-actions { flex: 1; display: flex; justify-content: flex-end; }
        .lang-btn { background: var(--p-green); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: 700; font-size: 0.7rem; border-radius: 4px; }

        .hero { padding: 40px 5% 20px; text-align: center; }
        .main-gold-logo { width: 100%; max-width: 280px; margin-bottom: 15px; }

        /* --- Slider --- */
        .slider-container { width: 92%; max-width: 1400px; margin: 0 auto 30px; aspect-ratio: 16/7; overflow: hidden; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* --- Section: Video --- */
        .video-section { width: 92%; max-width: 1000px; margin: 40px auto 20px; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* --- Brand Partners --- */
        .brand-partners { padding: 30px 5%; display: flex; justify-content: center; align-items: center; gap: clamp(20px, 5vw, 60px); flex-wrap: wrap; margin-bottom: 40px; }
        .brand-partners img { height: 35px; width: auto; filter: grayscale(1); opacity: 0.6; transition: 0.4s; object-fit: contain; }
        .brand-partners img.large-logo { height: 55px; opacity: 0.7; } 
        .brand-partners img:hover { filter: grayscale(0); opacity: 1 !important; transform: scale(1.05); }

        /* --- Grid & Cards --- */
        .container { width: 92%; max-width: 1400px; margin: 0 auto; flex: 1; }
        .grid-title { margin: 40px 0 25px; display: flex; align-items: center; gap: 15px; }
        .grid-title h2 { font-family: var(--font-head); font-size: 1.2rem; color: var(--p-green); letter-spacing: 2px; }
        .grid-title .line { flex: 1; height: 1px; background: var(--gold); opacity: 0.3; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .card { background: white; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; color: inherit; transition: 0.3s; border: 1px solid rgba(0,0,0,0.03); height: 100%; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .img-box { width: 100%; aspect-ratio: 1/1; padding: 15%; display: flex; align-items: center; justify-content: center; position: relative; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-badge { position: absolute; top: 12px; right: 12px; background: var(--gold); color: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 800; }
        
        .info { padding: 15px; text-align: center; flex-grow: 1; }
        .info h3 { font-size: 0.85rem; height: 2.8em; overflow: hidden; color: var(--p-green); margin-bottom: 8px; line-height: 1.4; }
        
        /* ปรับส่วนราคาให้อยู่คนละบรรทัด */
        .sale { font-size: 1.2rem; font-weight: 700; color: var(--p-green); display: block; line-height: 1.2; }
        .old { color: #adb5bd; text-decoration: line-through; font-size: 0.75rem; display: block; margin-top: 2px; }
        
        .btn-buy { background: var(--p-green); color: white; padding: 12px; text-align: center; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }

        @media (max-width: 768px) {
            .slider-container { aspect-ratio: 16/9; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .brand-partners img { height: 25px; }
            .brand-partners img.large-logo { height: 40px; }
            .info { padding: 10px; }
            .info h3 { font-size: 0.75rem; margin-bottom: 5px; }
            .sale { font-size: 1.05rem; }
            .old { font-size: 0.7rem; }
            .btn-buy { padding: 10px; font-size: 0.65rem; }
        }

        footer { background: #111; color: white; padding: 60px 5% 30px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

        <div class="slide" style="background-image: url('in6.jpg');"></div>
        <div class="slide" style="background-image: url('in7.jpg');"></div>
        <div class="slide" style="background-image: url('in8.jpg');"></div>

</div>

<section class="video-section">
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/hqyVA3VQoyo?autoplay=1&mute=1&loop=1&playlist=hqyVA3VQoyo&controls=0&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

</main>

<footer>
    <p>© 2024 HJ COSMETICS GLOBAL. ALL RIGHTS RESERVED.</p>
</footer>

    const products = [

        { id: 2, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลามมิ่ง โทนเนอร์", nameEn: "Original Herb Wormwood Calming Toner", nameKr: "오리지널 허브 웜우드 카밍 토너", sale: 350, old: 375, bTh: "ขายดี", bEn: "BEST", bKr: "인기", img: "2.jpeg" },
        { id: 3, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลีนซิ่ง วอเตอร์", nameEn: "Original Herb Wormwood Cleansing Water", nameKr: "오리지널 허브 웜우드 클렌징 워터", sale: 250, old: 400, bTh: "ใหม่", bEn: "NEW", bKr: "신상", img: "3.jpeg" },

        { id: 5, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด ชีท มาส์ก", nameEn: "Original Herb Wormwood Sheet Mask", nameKr: "오리지널 허브 웜우드 시트 마스크", sale: 13, old: 22, bTh: "มาส์ก", bEn: "MASK", bKr: "팩", img: "15.jpeg" },
        { id: 6, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ เบลมมิช โทนเนอร์", nameEn: "Heartleaf Blemish Toner", nameKr: "하트리프 블레미쉬 토너", sale: 360, old: 420, bTh: "ลดสิว", bEn: "ACNE", bKr: "트러블", img: "6.jpeg" },
        { id: 7, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ เบลมมิช มอยส์เจอร์ ครีม", nameEn: "Heartleaf Blemish Moisture Cream", nameKr: "하트리프 블레미쉬 모이스처라이저 크림", sale: 310, old: 464, bTh: "ชุ่มชื้น", bEn: "MOIST", bKr: "보습", img: "5.jpeg" },
        { id: 8, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ วอเตอร์ ฟิต กันแดด", nameEn: "Heartleaf Water Fit Sun", nameKr: "하트리프 워터 핏 선크림", sale: 320, old: 500, bTh: "บางเบา", bEn: "LIGHT", bKr: "산뜻", img: "12.jpeg" },
        { id: 9, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ แอรี่ ฟิต กันแดด", nameEn: "Heartleaf Airy Fit Sun", nameKr: "하트리프 에어리 핏 선크림", sale: 280, old: 420, bTh: "คุมมัน", bEn: "MATTE", bKr: "뽀송", img: "11.jpeg" },

        { id: 11, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ ครีม", nameEn: "Retin-Collagen 3D Core Cream", nameKr: "레틴 콜라겐 3D 코อร์ 크림", sale: 210, old: 420, bTh: "ริ้วรอย", bEn: "LIFT", bKr: "주름", img: "7.jpeg" },
        { id: 12, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ อายครีม", nameEn: "Retin-Collagen 3D Core Eye Cream", nameKr: "레틴 콜라겐 3D 코อร์ 아이크림", sale: 260, old: 331, bTh: "รอบดวงตา", bEn: "EYE", bKr: "눈가", img: "8.jpeg" },
        { id: 13, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี คอร์ ลิป ออยล์", nameEn: "Retin-Collagen 3D Core Lip Oil", nameKr: "레틴 콜라겐 3D 코อร์ 립 오일", sale: 107, old: 280, bTh: "ปากนุ่ม", bEn: "LIPS", bKr: "입술", img: "10.jpeg" },
        { id: 14, brand: "CharChar", nameTh: "มุงบีน ซิก้า คลีนซิ่ง โฟม", nameEn: "Mungbean Cica Cleansing Foam", nameKr: "녹두 시카 클렌징 폼", sale: 120, old: 225, bTh: "ล้ำลึก", bEn: "DEEP", bKr: "녹두", img: "14.jpeg" },
        { id: 15, brand: "Bathpa", nameTh: "บอดี้ โทนอัพ ครีม", nameEn: "Body Tone Up Cream", nameKr: "바디 톤업 크림", sale: 119, old: 320, bTh: "ผิวใส", bEn: "BODY", bKr: "미백", img: "13.jpeg" }
    ];

    let currentLang = localStorage.getItem('selectedLang') || 'th';

    function render() {
        const gf = document.getElementById('grid-f');
        const go = document.getElementById('grid-o');
        if(!gf || !go) return;
        gf.innerHTML = ''; go.innerHTML = '';
        
        products.forEach(p => {
            const name = currentLang === 'en' ? p.nameEn : (currentLang === 'kr' ? p.nameKr : p.nameTh);
            const badge = currentLang === 'en' ? p.bEn : (currentLang === 'kr' ? p.bKr : p.bTh);
            const shopText = currentLang === 'th' ? "ช้อปเลย" : (currentLang === 'kr' ? "지금 구매" : "SHOP NOW");
            
            const html = `
                <a href="product.html?id=${p.id}" class="card">
                    <div class="img-box">
                        <div class="product-badge">${badge}</div>
                        <img src="${p.img}">
                    </div>
                    <div class="info">
                        <h3 class="${currentLang === 'kr' ? 'kr-font' : ''}">${name}</h3>
                        <div class="sale">฿${p.sale}</div>
                        <div class="old">฿${p.old}</div>
                    </div>
                    <div class="btn-buy">${shopText}</div>
                </a>`;
            if(p.brand === "Fraijour") gf.innerHTML += html;
            else go.innerHTML += html;
        });
        document.getElementById('langBtn').textContent = currentLang.toUpperCase();
        document.getElementById('t-others').textContent = currentLang === 'th' ? "คัดสรรจากทั่วโลก" : (currentLang === 'kr' ? "글로벌 셀렉션" : "GLOBAL SELECTION");
    }

    function changeLang() {
        currentLang = currentLang === 'th' ? 'en' : (currentLang === 'en' ? 'kr' : 'th');
        localStorage.setItem('selectedLang', currentLang);
        render();
    }
    render();
</script>
</body>
</html>
