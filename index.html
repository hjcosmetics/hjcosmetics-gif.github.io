<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HJ COSMETICS | Premium Luxury Curator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@200;300;400;500&family=Montserrat:wght@300;600;800&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --sale-red: #e63946;
            --off-white: #fdfaf5;
            --font-th: 'Prompt', sans-serif;
            --font-en: 'Montserrat', sans-serif;
            --font-head: 'Cinzel', serif;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        
        body { 
            color: #2d3436; 
            font-family: var(--font-th); 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            position: relative;
            background: #0a1e16; 
        }

        /* --- Fix Video Background Area --- */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: #0a1e16;
        }
        .bg-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; 
            min-height: 100vh;
            min-width: 177.77vh; 
            transform: translate(-50%, -50%);
            pointer-events: none; 
        }
        .bg-video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(253, 250, 245, 0.85), rgba(245, 239, 230, 0.9));
        }

        /* --- Welcome Animation Overlay --- */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 31, 23, 0.88); 
            backdrop-filter: blur(25px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
