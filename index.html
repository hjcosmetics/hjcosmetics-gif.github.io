<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HJ COSMETICS | Premium Luxury Curator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@200;300;400;500&family=Montserrat:wght@300;600;800&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root { 
            --p-green: #1b4332; 
            --gold: #c5a059;
            --off-white: #fdfaf5;
            --font-th: 'Prompt', sans-serif;
            --font-en: 'Montserrat', sans-serif;
            --font-head: 'Cinzel', serif;
        }

        /* --- Global Setup --- */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { 
            background-color: var(--off-white); 
            color: #2d3436; 
            font-family: var(--font-th); 
            overflow-x: hidden; 
            display: flex; flex-direction: column; min-height: 100vh; 
        }

        /* --- Background --- */
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; opacity: 0.3; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(253,250,245,0.6) 0%, rgba(253,250,245,0.8) 100%); z-index: -1; }

        /* --- Nav --- */
        nav { 
            background: rgba(255, 255, 255, 0.95); height: clamp(70px, 10vh, 100px); 
            padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        .logo-nav img { height: clamp(40px, 5vh, 55px); width: auto; }
        .nav-links { display: flex; gap: clamp(15px, 3vw, 40px); }
        .nav-links a { text-decoration: none; color: var(--p-green); font-weight: 600; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-en); transition: 0.3s; }
        .nav-links a.active { color: var(--gold); }
        .lang-btn { background: var(--p-green); color: white; border: none; padding: 8px 16px; cursor: pointer; font-weight: 700; font-size: 0.7rem; font-family: var(--font-en); }

        /* --- Hero --- */
        .hero { padding: 5vh 5% 2vh; text-align: center; }
        .main-gold-logo { width: 100%; max-width: 300px; height: auto; margin-bottom: 20px; }
        .hero-title { font-family: var(--font-head); font-size: clamp(1.5rem, 5vw, 2.5rem); color: var(--p-green); letter-spacing: 5px; }

        /* --- Responsive Slider --- */
        .slider-container { 
            width: 90%; max-width: 1400px; margin: 20px auto 40px; 
            aspect-ratio: 16/7; overflow: hidden; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease-in-out; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* --- Section Titles --- */
        .container { width: 92%; max-width: 1400px; margin: 40px auto; flex: 1; }
        .grid-title { margin-bottom: 30px; display: flex; align-items: center; gap: 20px; }
        .grid-title h2 { font-family: var(--font-head); font-size: clamp(1.1rem, 3vw, 1.5rem); color: var(--p-green); white-space: nowrap; letter-spacing: 3px; }
        .grid-title .line { flex: 1; height: 1px; background: var(--gold); opacity: 0.3; }

        /* --- Product Grid (Responsive) --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: clamp(15px, 2vw, 30px); 
            margin-bottom: 60px; 
        }

        .card { 
            background: white; border-radius: 8px; overflow: hidden; 
            display: flex; flex-direction: column; text-decoration: none; color: inherit;
            transition: 0.4s; border: 1px solid rgba(0,0,0,0.03); height: 100%;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .img-box { width: 100%; aspect-ratio: 1/1; padding: 10%; display: flex; align-items: center; justify-content: center; position: relative; background: #fff; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .product-badge { position: absolute; top: 12px; right: 12px; background: var(--gold); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 800; font-family: var(--font-en); }
        
        .info { padding: clamp(10px, 2vw, 20px); text-align: center; flex-grow: 1; }
        .info h3 { font-size: 0.9rem; line-height: 1.4; height: 2.8em; overflow: hidden; margin-bottom: 15px; color: var(--p-green); }
        .sale { font-size: 1.3rem; font-weight: 700; color: var(--p-green); font-family: var(--font-en); }
        .old { color: #adb5bd; text-decoration: line-through; margin-left: 8px; font-size: 0.85rem; font-family: var(--font-en); }
        
        .btn-buy { background: var(--p-green); color: white; padding: 15px; text-align: center; font-weight: 700; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; font-family: var(--font-en); }

        /* --- Footer --- */
        footer { padding: 40px 0; text-align: center; }
        .copy { font-size: 0.7rem; color: #888; letter-spacing: 2px; font-family: var(--font-en); }

        /* --- Mobile Breakpoints --- */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* ซ่อนเมนูในมือถือเพื่อให้ดูคลีน */
            .slider-container { aspect-ratio: 1/1; width: 95%; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .info h3 { font-size: 0.8rem; }
            .sale { font-size: 1.1rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<video autoplay muted loop playsinline id="bg-video"><source src="วิดีโอทำเว็บไซต์.mp4" type="video/mp4"></video>
<div class="bg-overlay"></div>

<nav>
    <div class="logo-nav"><a href="index.html"><img src="HJ (5).png"></a></div>
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
    <button onclick="changeLang()" id="langBtn" class="lang-btn">TH</button>
</nav>

<header class="hero">
    <img src="gold.png" class="main-gold-logo">
    <h1 class="hero-title" id="h-title">The Masterpiece</h1>
</header>

<div class="slider-container">
    <div class="slider-wrapper" id="sliderWrapper">
        <div class="slide" style="background-image: url('in1.jpg');"></div>
        <div class="slide" style="background-image: url('in2.jpg');"></div>
        <div class="slide" style="background-image: url('in3.jpg');"></div>
        <div class="slide" style="background-image: url('in4.jpg');"></div>
    </div>
</div>

<main class="container">
    <div class="grid-title"><h2>FRAIJOUR HERBS</h2><div class="line"></div></div>
    <div class="product-grid" id="grid-f"></div>
    
    <div class="grid-title"><h2 id="t-others">GLOBAL SELECTION</h2><div class="line"></div></div>
    <div class="product-grid" id="grid-o"></div>
</main>

<footer>
    <div class="copy">© 2024 HJ COSMETICS GLOBAL. ALL RIGHTS RESERVED.</div>
</footer>

<script>
    // Slider
    let index = 0;
    const wrapper = document.getElementById('sliderWrapper');
    const slidesCount = 4; // ตามจำนวน slide
    function next() {
        index = (index + 1) % slidesCount;
        wrapper.style.transform = `translateX(-${index * 100}%)`;
    }
    setInterval(next, 4000);

    // Full 15 Products Data
    const products = [
        { id: 1, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด วอเตอรี่ ครีม", nameEn: "Original Herb Wormwood Watery Cream", sale: 290, old: 369, badge: "HOT", img: "1.jpg.png" },
        { id: 2, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด โทนเนอร์", nameEn: "Original Herb Wormwood Toner", sale: 350, old: 459, badge: "BEST", img: "2.jpeg" },
        { id: 3, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลีนซิ่ง วอเตอร์", nameEn: "Original Herb Wormwood Cleansing Water", sale: 250, old: 390, badge: "NEW", img: "3.jpeg" },
        { id: 4, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด คลีนซิ่ง โฟม", nameEn: "Original Herb Wormwood Cleansing Foam", sale: 290, old: 290, badge: "TOP", img: "4.jpeg" },
        { id: 5, brand: "Fraijour", nameTh: "ออริจินัล เฮิร์บ วอร์มวูด ชีท มาส์ก", nameEn: "Original Herb Wormwood Sheet Mask", sale: 13, old: 50, badge: "MASK", img: "15.jpeg" },
        { id: 6, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ เบลมมิช โทนเนอร์", nameEn: "Heartleaf Blemish Toner", sale: 360, old: 500, badge: "ACNE", img: "6.jpeg" },
        { id: 7, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ มอยส์เจอร์ ครีม", nameEn: "Heartleaf Moistur Cream", sale: 310, old: 450, badge: "MOIST", img: "5.jpeg" },
        { id: 8, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ วอเตอร์ ฟิต กันแดด", nameEn: "Heartleaf Water Fit Sun", sale: 320, old: 490, badge: "LIGHT", img: "12.jpeg" },
        { id: 9, brand: "Fraijour", nameTh: "ฮาร์ทลีฟ แอรี่ ฟิต กันแดด", nameEn: "Heartleaf Airy Fit Sun", sale: 280, old: 490, badge: "MATTE", img: "11.jpeg" },
        { id: 10, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี โทนเนอร์", nameEn: "Retin Collagen 3D Toner", sale: 200, old: 480, badge: "FIRM", img: "9.jpeg" },
        { id: 11, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี ครีม", nameEn: "Retin Collagen 3D Cream", sale: 150, old: 550, badge: "LIFT", img: "7.jpeg" },
        { id: 12, brand: "Fraijour", nameTh: "เรติน คอลลาเจน 3ดี อายครีม", nameEn: "Retin Collagen Eye Cream", sale: 159, old: 490, badge: "EYE", img: "8.jpeg" },
        { id: 13, brand: "Fraijour", nameTh: "เรติน คอลลาเจน ลิป ออยล์", nameEn: "Retin Collagen Lip Oil", sale: 107, old: 350, badge: "LIPS", img: "10.jpeg" },
        { id: 14, brand: "CharChar", nameTh: "มุงบีน ซิก้า โฟม", nameEn: "Mungbean Cica Foam", sale: 120, old: 390, badge: "DEEP", img: "14.jpeg" },
        { id: 15, brand: "Bathpa", nameTh: "บอดี้ โทนอัพ ครีม", nameEn: "Body Tone Up Cream", sale: 119, old: 450, badge: "BODY", img: "13.jpeg" }
    ];

    let currentLang = localStorage.getItem('selectedLang') || 'th';

    function render() {
        const gridF = document.getElementById('grid-f');
        const gridO = document.getElementById('grid-o');
        gridF.innerHTML = ''; gridO.innerHTML = '';
        
        products.forEach(p => {
            const name = currentLang === 'th' ? p.nameTh : p.nameEn;
            const btnText = currentLang === 'th' ? "ช้อปเลย" : "SHOP NOW";
            const html = `
                <a href="product.html?id=${p.id}" class="card">
                    <div class="img-box">
                        <div class="product-badge">${p.badge}</div>
                        <img src="${p.img}">
                    </div>
                    <div class="info">
                        <h3>${name}</h3>
                        <div class="sale">฿${p.sale} <span class="old">฿${p.old}</span></div>
                    </div>
                    <div class="btn-buy">${btnText}</div>
                </a>`;
            if(p.brand === "Fraijour") gridF.innerHTML += html;
            else gridO.innerHTML += html;
        });
        document.getElementById('langBtn').textContent = currentLang.toUpperCase();
        localStorage.setItem('selectedLang', currentLang);
    }

    function changeLang() {
        currentLang = currentLang === 'th' ? 'en' : 'th';
        render();
    }

    render();
</script>
</body>
</html>
