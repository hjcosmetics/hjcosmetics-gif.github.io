<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HJ COSMETICS | Premium Luxury Curator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Prompt:wght@200;300;400;500&family=Montserrat:wght@300;600;800&display=swap');

        :root { --p-green: #1b4332; --gold: #c5a059; --sale-red: #e63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a1e16; font-family: 'Prompt', sans-serif; overflow-x: hidden; min-height: 100vh; }

        /* Video Background */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10; 
            overflow: hidden;
        }
        .bg-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            transform: translate(-50%, -50%);
            border: none;
            pointer-events: none;
        }
        .bg-video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -9;
            background: linear-gradient(135deg, rgba(253, 250, 245, 0.8), rgba(245, 239, 230, 0.85));
        }

        /* Video Section */
        .video-section { width: 92%; max-width: 1000px; margin: 40px auto; position: relative; z-index: 1; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Welcome Overlay */
        .welcome-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 31, 23, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .welcome-box { background: #fff; padding: 50px; border-radius: 20px; text-align: center; cursor: pointer; }

        nav { background: rgba(255,255,255,0.95); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; position: sticky; top: 0; z-index: 100; }
        .container { width: 94%; max-width: 1200px; margin: 20px auto; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    </style>
</head>
<body>

<div class="bg-video-container">
    <iframe src="https://www.youtube.com/embed/hqyVA3VQoyo?autoplay=1&mute=1&loop=1&playlist=hqyVA3VQoyo&controls=0&showinfo=0&rel=0&playsinline=1" allow="autoplay; encrypted-media"></iframe>
</div>
<div class="bg-video-overlay"></div>

<div class="welcome-overlay" id="welcomeOverlay" onclick="this.style.opacity='0'; setTimeout(()=>this.style.display='none', 800)">
    <div class="welcome-box"><h1>WELCOME</h1><p>Click to Enter</p></div>
</div>

<nav><div>HJ COSMETICS</div></nav>

<section class="video-section">
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/hqyVA3VQoyo?autoplay=1&mute=1&loop=1&playlist=hqyVA3VQoyo&controls=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</section>

<main class="container">
    <div class="product-grid" id="grid"></div>
</main>

<script>
    // โหลดข้อมูลสินค้า
    const products = [{name: "Product 1", price: "300"}, {name: "Product 2", price: "350"}];
    const grid = document.getElementById('grid');
    products.forEach(p => {
        grid.innerHTML += `<div style="background:white; padding:20px; border-radius:10px;"><h3>${p.name}</h3><p>฿${p.price}</p></div>`;
    });
</script>

</body>
</html>
